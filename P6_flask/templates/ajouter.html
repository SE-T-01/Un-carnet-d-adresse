{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h3>Ajouter un contact</h3>
    <form method="POST">
        <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" class="form-control" required>
        </div>
       <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" 
                name="telephone" 
                class="form-control" 
                pattern="[0-9]{10}" 
                maxlength="10" 
                placeholder="Ex: 0612345678" 
                required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="Ex: abc@gmail.com" required>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-success" style="flex: 1;">Enregistrer</button>
            <a href="/" class="btn" style="background: #e5e7eb; color: #1f2937; text-align: center; flex: 1;">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
