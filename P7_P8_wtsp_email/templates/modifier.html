{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h3>Modifier le contact</h3>
    <form method="POST">
        <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" value="{{ contact.nom }}" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" value="{{ contact.prenom }}" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Catégorie médicale</label>
            <select name="categorie" class="form-control" required>
                <option value="Patient" {% if contact.categorie == 'Patient' %}selected{% endif %}>Patient</option>
                <option value="Laboratoire" {% if contact.categorie == 'Laboratoire' %}selected{% endif %}>Laboratoire</option>
                <option value="Fournisseur" {% if contact.categorie == 'Fournisseur' %}selected{% endif %}>Fournisseur</option>
            </select>
        </div>

        <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" 
                   name="telephone" 
                   value="{{ contact.telephone }}" 
                   class="form-control" 
                   pattern="[0-9]{10}" 
                   maxlength="10" 
                   placeholder="Ex: 0612345678" 
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" 
                   name="email" 
                   value="{{ contact.email }}" 
                   class="form-control" 
                   placeholder="Ex: abc@gmail.com" 
                   required>
        </div>

        <div class="form-group">
            <label>Adresse physique</label>
            <input type="text" name="adresse" value="{{ contact.adresse }}" class="form-control">
        </div>

        <div class="form-group">
            <label>Fonction / Poste</label>
            <input type="text" name="fonction" value="{{ contact.fonction }}" class="form-control" placeholder="Ex: Patient, Médecin, Technicien">
        </div>

        <div class="form-group">
            <label>Entreprise / Établissement</label>
            <input type="text" name="entreprise" value="{{ contact.entreprise }}" class="form-control" placeholder="Ex: Labo Bio, Pharmacie Centrale">
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
            <button type="submit" class="btn btn-warning" style="flex: 1;">Mettre à jour</button>
            <a href="/" class="btn" style="background: #e5e7eb; color: #1f2937; text-align: center; flex: 1;">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
